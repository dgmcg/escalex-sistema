<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Escalex — Escalas Médicas</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .hero {
    background: linear-gradient(160deg, var(--navy-900), var(--navy-700) 70%);
    color: #fff;
    text-align: center;
    padding: 56px 24px 40px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,172,31,0.18), transparent 70%);
  }
  .hero-icon {
    width: 56px; height: 56px;
    margin: 0 auto 14px;
    display: block;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: 1.9rem;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  .hero p {
    font-size: 0.85rem;
    opacity: 0.85;
    margin: 0;
    max-width: 320px;
    margin: 0 auto;
    line-height: 1.5;
  }
  .login-body {
    flex: 1;
    margin-top: -24px;
  }
  .login-card {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 18px;
  }
  .footer-gov {
    text-align: center;
    padding: 18px;
    font-size: 0.72rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="hero">
    <svg class="hero-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="17" rx="3" stroke="#fff" stroke-width="1.6"/>
      <path d="M3 9H21" stroke="#fff" stroke-width="1.6"/>
      <path d="M8 2.5V5.5M16 2.5V5.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M12 12.5V17M9.75 14.75H14.25" stroke="#e8ac1f" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <h1>ESCALEX</h1>
    <p>Sistema inteligente para a gestão de escalas de profissionais da saúde</p>
  </div>

  <div class="login-body">
    <div class="login-card">
      <div class="card" style="margin-top: 0;">
        <div id="alertBox"></div>
        <form id="formLogin">
          <div class="field">
            <label for="username">Usuário</label>
            <input type="text" id="username" autocomplete="username" placeholder="nome.sobrenome" required>
          </div>
          <div class="field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="btnEntrar">Entrar</button>
        </form>
      </div>
    </div>
  </div>

  <div class="footer-gov">
    Governo de Pernambuco — Secretaria de Saúde
  </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/login.js"></script>
</body>
</html>
