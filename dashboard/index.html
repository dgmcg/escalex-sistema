<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalex — Painel em Tempo Real</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { max-width: 380px; width: 100%; padding: 0 18px; }
  .login-box .eyebrow { text-align:center; color: var(--navy-700); font-size:0.75rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .login-box h1 { text-align:center; font-family: var(--font-display); color: var(--navy-900); margin: 0 0 24px; }
</style>
</head>
<body>
<div class="login-box">
  <div class="eyebrow">Escalex</div>
  <h1>Painel em Tempo Real</h1>
  <div class="card">
    <div id="alertBox"></div>
    <form id="formLoginDashboard">
      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" required>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required>
      </div>
      <button type="submit" class="btn btn-primary" id="btnEntrar">Entrar</button>
    </form>
  </div>
</div>
<script src="../assets/js/api.js"></script>
<script src="assets/js/login-dashboard.js"></script>
</body>
</html>
